<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Pookie Wishes</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body{background:var(--bg2)}
    /* Login */
    .login-pg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rx);padding:48px 40px;max-width:380px;width:100%;text-align:center;box-shadow:var(--sh-lg)}
    .login-ico{font-size:2.8rem;display:block;margin-bottom:14px}
    .login-title{font-family:var(--fd);font-size:1.6rem;font-weight:700;margin-bottom:6px}
    .login-sub{font-size:.84rem;color:var(--muted);margin-bottom:22px}
    /* Layout */
    .admin-wrap{display:none;min-height:100vh}
    .admin-wrap.on{display:flex}
    .sidebar{width:230px;background:var(--card);border-right:1px solid var(--bdr);padding:18px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:10}
    .sb-logo{font-family:var(--fd);font-size:1.15rem;font-weight:700;background:var(--g-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;padding:0 18px 16px;border-bottom:1px solid var(--bdr);margin-bottom:10px}
    .sb-logo small{display:block;font-family:var(--fm);font-size:.58rem;-webkit-text-fill-color:var(--dim);margin-top:2px}
    .sb-link{display:flex;align-items:center;gap:9px;padding:10px 18px;color:var(--muted);font-size:.86rem;cursor:pointer;transition:all .18s;border-left:2px solid transparent}
    .sb-link:hover,.sb-link.on{background:var(--bg2);color:var(--text2);border-left-color:var(--pink)}
    .sb-foot{margin-top:auto;padding:14px 18px;border-top:1px solid var(--bdr)}
    .sb-user{font-size:.75rem;color:var(--dim);margin-bottom:10px;word-break:break-all}
    .main{flex:1;margin-left:230px;padding:28px 32px;overflow-y:auto}
    .main-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .main-title{font-family:var(--fd);font-size:1.5rem;font-weight:700;color:var(--text)}
    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
    .stat-c{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:18px;box-shadow:var(--sh)}
    .stat-n{font-family:var(--fd);font-size:1.8rem;font-weight:700;background:var(--g-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .stat-l{font-size:.76rem;color:var(--muted);margin-top:3px}
    /* Table */
    .tbl{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
    .tbl-hd{display:grid;grid-template-columns:130px 1fr 130px 110px 100px 80px;gap:10px;padding:11px 16px;background:var(--bg2);border-bottom:1px solid var(--bdr);font-family:var(--fm);font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
    .tbl-row{display:grid;grid-template-columns:130px 1fr 130px 110px 100px 80px;gap:10px;padding:13px 16px;border-bottom:1px solid var(--bdr);align-items:center;cursor:pointer;transition:background .18s}
    .tbl-row:last-child{border:none}
    .tbl-row:hover{background:var(--bg2)}
    .tc{font-size:.82rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tc.mono{font-family:var(--fm);font-size:.74rem}
    .pill{display:inline-block;font-family:var(--fm);font-size:.62rem;padding:3px 9px;border-radius:100px;white-space:nowrap}
    .pill-pending{background:rgba(255,224,110,.1);color:#c8a600;border:1px solid rgba(255,224,110,.25)}
    .pill-verified{background:rgba(122,174,232,.1);color:var(--blue);border:1px solid rgba(122,174,232,.2)}
    .pill-progress{background:rgba(168,158,232,.1);color:var(--lav);border:1px solid rgba(168,158,232,.2)}
    .pill-delivered{background:rgba(76,187,138,.1);color:var(--green);border:1px solid rgba(76,187,138,.2)}
    .empty{text-align:center;padding:48px;color:var(--dim);font-size:.9rem}
    /* Filters */
    .filters{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
    .fbtn{padding:5px 14px;border-radius:100px;font-size:.76rem;cursor:pointer;border:1px solid var(--bdr);background:var(--card);color:var(--muted);transition:all .18s}
    .fbtn.on{background:var(--pink-s);border-color:var(--bdr-pink);color:var(--pink)}
    /* Drawer */
    .drw-ov{position:fixed;inset:0;background:rgba(20,22,50,.35);z-index:400;display:none}
    .drw-ov.on{display:block}
    .drw{position:fixed;top:0;right:0;width:460px;height:100vh;background:var(--card);border-left:1px solid var(--bdr);z-index:500;overflow-y:auto;transform:translateX(100%);transition:transform .3s var(--ease)}
    .drw.on{transform:translateX(0)}
    .drw-hd{padding:18px 22px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1}
    .drw-title{font-family:var(--fd);font-size:1rem;font-weight:700;color:var(--text)}
    .drw-x{width:27px;height:27px;border-radius:50%;background:var(--bg2);border:1px solid var(--bdr);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .18s}
    .drw-x:hover{background:#ffecec;color:#e05a5a}
    .drw-body{padding:18px 22px}
    .inf-lbl{font-family:var(--fm);font-size:.63rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .inf-row{display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
    .inf-item{display:flex;gap:8px;font-size:.84rem}
    .inf-k{color:var(--muted);min-width:86px;flex-shrink:0}
    .inf-v{color:var(--text2);font-weight:500;word-break:break-all}
    .ss-link{color:var(--pink);text-decoration:none;font-size:.82rem}
    .ss-link:hover{text-decoration:underline}
    .del-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:14px}
    .del-title{font-family:var(--fd);font-weight:700;font-size:.9rem;margin-bottom:12px;color:var(--text)}
    .qr-up{border:2px dashed var(--bdr2);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:10px}
    .qr-up:hover{border-color:var(--bdr-pink);background:var(--pink-s)}
    .qr-prev{max-width:120px;max-height:120px;border-radius:var(--rs);margin:8px auto;display:block}
  </style>
</head>
<body>

<!-- Login -->
<div id="login-pg" class="login-pg">
  <div class="login-card">
    <span class="login-ico">🔐</span>
    <div class="login-title">Admin Panel</div>
    <p class="login-sub">Sign in with your authorised Google account.</p>
    <button class="btn btn-google btn-full btn-lg" onclick="adminLogin()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v8.51h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.14z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="#FBBC05" d="M10.53 28.59c-.49-1.47-.76-3.04-.76-4.59s.27-3.12.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.55 10.78l7.98-6.19z"/><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.55 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/></svg>
      Sign in with Google
    </button>
    <p id="login-err" style="color:#e05a5a;font-size:.78rem;margin-top:10px;display:none"></p>
  </div>
</div>

<!-- Admin app -->
<div id="admin-wrap" class="admin-wrap">
  <div class="sidebar">
    <div class="sb-logo">Pookie Wishes<small>Admin Panel</small></div>
    <div class="sb-link on" onclick="setTab('all',this)">📋 All Orders</div>
    <div class="sb-link" onclick="setTab('pending_verification',this)">⏳ Pending Verification</div>
    <div class="sb-link" onclick="setTab('verified',this)">✅ Verified</div>
    <div class="sb-link" onclick="setTab('in_progress',this)">🔧 In Progress</div>
    <div class="sb-link" onclick="setTab('delivered',this)">🎁 Delivered</div>
    <div class="sb-foot">
      <div class="sb-user" id="sb-email"></div>
      <button class="btn btn-ghost btn-full btn-sm" onclick="adminLogout()">Sign Out</button>
    </div>
  </div>
  <div class="main">
    <div class="main-hd">
      <div class="main-title" id="main-title">All Orders</div>
      <button class="btn btn-soft btn-sm" onclick="loadOrders()">↻ Refresh</button>
    </div>
    <div class="stats">
      <div class="stat-c"><div class="stat-n" id="s-total">0</div><div class="stat-l">Total Orders</div></div>
      <div class="stat-c"><div class="stat-n" id="s-rev">₹0</div><div class="stat-l">Revenue</div></div>
      <div class="stat-c"><div class="stat-n" id="s-pend">0</div><div class="stat-l">Pending</div></div>
      <div class="stat-c"><div class="stat-n" id="s-done">0</div><div class="stat-l">Delivered</div></div>
    </div>
    <div class="tbl">
      <div class="tbl-hd"><div>Order ID</div><div>Customer</div><div>Template</div><div>Amount</div><div>Status</div><div>Date</div></div>
      <div id="tbl-body"><div class="empty">Loading orders…</div></div>
    </div>
  </div>
</div>

<!-- Drawer -->
<div class="drw-ov" id="drw-ov" onclick="closeDrawer()"></div>
<div class="drw" id="drw">
  <div class="drw-hd">
    <div class="drw-title" id="drw-title">Order Details</div>
    <div class="drw-x" onclick="closeDrawer()">✕</div>
  </div>
  <div class="drw-body" id="drw-body"></div>
</div>

<div id="toasts"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
const ADMIN_EMAILS = ['teamcipher.work@gmail.com', 'nikhil2005114@gmail.com'];
let SITE=null, db=null, stor=null, orders=[], curFilter='all', curOrderId=null, qrFile=null;

window.addEventListener('DOMContentLoaded', async () => {
  SITE = await fetch('../data/site.json').then(r=>r.json());
  if (!firebase.apps.length) firebase.initializeApp(SITE.firebase);
  db = firebase.firestore(); stor = firebase.storage();
  // EmailJS: no global init needed — per-send with publicKey param
  firebase.auth().onAuthStateChanged(user => {
    if (user && ADMIN_EMAILS.includes(user.email)) showAdmin(user);
    else if (user) { firebase.auth().signOut(); showErr('Not authorised.'); }
    else { document.getElementById('login-pg').style.display='flex'; document.getElementById('admin-wrap').classList.remove('on'); }
  });
});

async function adminLogin() {
  try { await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  catch(e) { if (e.code !== 'auth/popup-closed-by-user') showErr('Login failed.'); }
}
async function adminLogout() { await firebase.auth().signOut(); }
function showErr(m) { const el=document.getElementById('login-err'); el.textContent=m; el.style.display='block'; }
function showAdmin(user) {
  document.getElementById('login-pg').style.display='none';
  document.getElementById('admin-wrap').classList.add('on');
  document.getElementById('sb-email').textContent = user.email;
  loadOrders();
}

async function loadOrders() {
  document.getElementById('tbl-body').innerHTML = '<div class="empty">Loading…</div>';
  try {
    const snap = await db.collection('orders').orderBy('createdAt','desc').get();
    orders = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
    updateStats(); renderTable();
  } catch(e) { document.getElementById('tbl-body').innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

function updateStats() {
  document.getElementById('s-total').textContent = orders.length;
  document.getElementById('s-rev').textContent   = '₹' + orders.reduce((s,o)=>s+(o.totalAmount||0),0);
  document.getElementById('s-pend').textContent  = orders.filter(o=>o.status==='pending_verification').length;
  document.getElementById('s-done').textContent  = orders.filter(o=>o.deliveryStatus==='delivered').length;
}

function setTab(filter, el) {
  curFilter = filter;
  document.querySelectorAll('.sb-link').forEach(l=>l.classList.remove('on'));
  el.classList.add('on');
  const titles = {all:'All Orders',pending_verification:'⏳ Pending Verification',verified:'✅ Verified',in_progress:'🔧 In Progress',delivered:'🎁 Delivered'};
  document.getElementById('main-title').textContent = titles[filter]||'Orders';
  renderTable();
}

const STATUS_MAP = {
  pending_verification: { label:'Pending',    cls:'pill-pending'   },
  verified:             { label:'Verified',   cls:'pill-verified'  },
  in_progress:          { label:'In Progress',cls:'pill-progress'  },
  delivered:            { label:'Delivered',  cls:'pill-delivered' }
};

function renderTable() {
  const list = curFilter==='all' ? orders : orders.filter(o=>o.status===curFilter||o.deliveryStatus===curFilter);
  if (!list.length) { document.getElementById('tbl-body').innerHTML='<div class="empty">No orders here.</div>'; return; }
  document.getElementById('tbl-body').innerHTML = list.map(o => {
    const s   = STATUS_MAP[o.deliveryStatus==='delivered'?'delivered':o.status] || STATUS_MAP.pending_verification;
    const dt  = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '—';
    const tpl = (o.orders||[]).map(x=>x.templateName||x.emoji||'').join(', ') || '—';
    const oid = o.orderId || o._docId;
    return `
      <div class="tbl-row" onclick="openDrawer('${oid}')">
        <div class="tc mono">${oid}</div>
        <div class="tc">${o.buyerName||'—'}<br><span style="font-size:.72rem;color:var(--dim)">${o.buyerEmail||''}</span></div>
        <div class="tc">${tpl}</div>
        <div class="tc mono">₹${o.totalAmount||0}</div>
        <div class="tc"><span class="pill ${s.cls}">${s.label}</span></div>
        <div class="tc" style="font-size:.76rem;color:var(--dim)">${dt}</div>
      </div>`;
  }).join('');
}

function openDrawer(oid) {
  curOrderId = oid;
  const o = orders.find(x=>(x.orderId||x._docId)===oid);
  if (!o) return;
  qrFile = null;
  document.getElementById('drw-title').textContent = `Order ${oid}`;
  document.getElementById('drw-ov').classList.add('on');
  document.getElementById('drw').classList.add('on');

  const dt = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString('en-IN') : '—';
  const orderItems = (o.orders||[]).map(x=>`
    <div style="padding:8px 0;border-bottom:1px solid var(--bdr);font-size:.82rem">
      <strong>${x.templateName||x.templateId}</strong><br>
      <span style="color:var(--muted)">For: ${x.bdayName} · Birthday: ${x.bdayDate} · Needed by: ${x.neededBy}</span>
    </div>`).join('');

  const statusOpts = ['pending_verification','verified','in_progress','delivered'].map(s=>
    `<option value="${s}" ${o.status===s?'selected':''}>${STATUS_MAP[s]?.label||s}</option>`
  ).join('');

  document.getElementById('drw-body').innerHTML = `
    <div class="inf-lbl">Customer</div>
    <div class="inf-row">
      <div class="inf-item"><span class="inf-k">Name</span><span class="inf-v">${o.buyerName||'—'}</span></div>
      <div class="inf-item"><span class="inf-k">Email</span><span class="inf-v">${o.buyerEmail||'—'}</span></div>
      <div class="inf-item"><span class="inf-k">WhatsApp</span><span class="inf-v"><a href="https://wa.me/${(o.buyerPhone||'').replace(/\D/g,'')}" target="_blank" style="color:var(--pink)">${o.buyerPhone||'—'}</a></span></div>
      <div class="inf-item"><span class="inf-k">Submitted</span><span class="inf-v">${dt}</span></div>
      <div class="inf-item"><span class="inf-k">Amount</span><span class="inf-v" style="font-weight:700">₹${o.totalAmount||0}</span></div>
    </div>
    <div class="inf-lbl">Templates (${(o.orders||[]).length})</div>
    <div style="margin-bottom:16px">${orderItems}</div>
    <div class="inf-lbl">Payment Screenshot</div>
    <div style="margin-bottom:16px">
      ${o.screenshotUrl && o.screenshotUrl!=='(upload failed)'
        ? `<a href="${o.screenshotUrl}" target="_blank" class="ss-link">📸 View Screenshot →</a>`
        : '<span style="color:var(--muted);font-size:.82rem">Not available</span>'}
    </div>
    <div class="inf-lbl">Update Status</div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <select class="f-inp" id="status-sel" style="flex:1"><option value="">— select —</option>${statusOpts}</select>
      <button class="btn btn-soft btn-sm" onclick="updateStatus()">Save</button>
    </div>
    <div class="inf-lbl">Send Google Form Link to Customer</div>
    <div style="margin-bottom:20px">
      <button class="btn btn-soft-blue btn-full" onclick="sendFormLink()">📋 Send Form Link Email</button>
      <p style="font-size:.74rem;color:var(--dim);margin-top:6px">Sends email 3 (Google Form link) to ${o.buyerEmail}</p>
    </div>
    <div class="del-box">
      <div class="del-title">📤 Deliver Website</div>
      <div class="f-group">
        <label class="f-label">WEBSITE LINK *</label>
        <input class="f-inp" id="del-link" type="url" placeholder="https://your-birthday-site.vercel.app" value="${o.deliveryLink||''}">
      </div>
      <div class="f-group">
        <label class="f-label">QR CODE IMAGE</label>
        <div class="qr-up" onclick="document.getElementById('qr-inp').click()">
          <div id="qr-prev-wrap">
            ${o.qrImageUrl
              ? `<img src="${o.qrImageUrl}" class="qr-prev" alt="QR">`
              : '📱<br><span style="font-size:.78rem;color:var(--muted)">Click to upload QR image</span>'}
          </div>
        </div>
        <input type="file" id="qr-inp" accept="image/*" style="display:none" onchange="previewQR(this)">
      </div>
      <button class="btn btn-primary btn-full" id="del-btn" onclick="deliver()">📧 Send Delivery Email</button>
      <p style="font-size:.74rem;color:var(--dim);margin-top:6px;text-align:center">Emails the website link + QR to ${o.buyerEmail}</p>
    </div>`;
}

function closeDrawer() { document.getElementById('drw-ov').classList.remove('on'); document.getElementById('drw').classList.remove('on'); curOrderId=null; }

async function updateStatus() {
  if (!curOrderId) return;
  const s = document.getElementById('status-sel').value;
  if (!s) return;
  try {
    await db.collection('orders').doc(curOrderId).update({ status: s });
    const o = orders.find(x=>(x.orderId||x._docId)===curOrderId); if (o) o.status=s;
    updateStats(); renderTable(); toast('Status updated ✅','ok');
  } catch(e) { toast('Update failed','err'); }
}

async function sendFormLink() {
  const o = orders.find(x=>(x.orderId||x._docId)===curOrderId);
  if (!o) return;
  const ejs2   = SITE.emailjs?.account2;
  if (!ejs2?.serviceId || ejs2.serviceId.startsWith('YOUR')) { toast('EmailJS account2 not configured','err'); return; }
  const formUrl = SITE.googleForm?.formUrl || '#';
  const orderLines = (o.orders||[]).map((x,i)=>`${i+1}. ${x.templateName} — For: ${x.bdayName} (${x.bdayDate}) — Needed by: ${x.neededBy}`).join('\n');
  try {
    await emailjs.send(ejs2.serviceId, ejs2.templateId_form_link, {
      to_name:          o.buyerName,
      to_email:         o.buyerEmail,
      order_id:         curOrderId,
      template_name:    (o.orders||[]).map(x=>x.templateName).join(', '),
      bday_person_name: (o.orders||[]).map(x=>x.bdayName).join(', '),
      bday_date:        (o.orders||[]).map(x=>x.bdayDate).join(', '),
      needed_by:        (o.orders||[]).map(x=>x.neededBy).join(', '),
      order_lines:      orderLines,
      google_form_link: formUrl,
      from_name:        'Pookie Wishes'
    }, ejs2.publicKey);
    await db.collection('orders').doc(curOrderId).update({ status:'verified', formLinkSentAt: firebase.firestore.FieldValue.serverTimestamp() });
    const ord = orders.find(x=>(x.orderId||x._docId)===curOrderId); if (ord) ord.status='verified';
    updateStats(); renderTable(); toast('Form link email sent! ✅','ok');
  } catch(e) { console.error(e); toast('Email failed — check EmailJS config','err'); }
}

function previewQR(input) {
  qrFile = input.files[0];
  if (!qrFile) return;
  const r = new FileReader();
  r.onload = e => { document.getElementById('qr-prev-wrap').innerHTML = `<img src="${e.target.result}" class="qr-prev" alt="QR">`; };
  r.readAsDataURL(qrFile);
}

async function deliver() {
  const o = orders.find(x=>(x.orderId||x._docId)===curOrderId);
  if (!o) return;
  const link = document.getElementById('del-link').value.trim();
  if (!link) { toast('Enter the website link first','err'); return; }
  const btn = document.getElementById('del-btn');
  btn.disabled=true; btn.textContent='Sending…';

  let qrUrl = o.qrImageUrl || '';
  if (qrFile) {
    try {
      const ref = stor.ref(`qr-codes/${curOrderId}.png`);
      await ref.put(qrFile);
      qrUrl = await ref.getDownloadURL();
    } catch(e) { console.warn('QR upload failed:', e); }
  }

  await db.collection('orders').doc(curOrderId).update({ deliveryLink:link, qrImageUrl:qrUrl });
  if (o) { o.deliveryLink=link; o.qrImageUrl=qrUrl; }

  const ejs1 = SITE.emailjs?.account1;
  if (!ejs1?.serviceId || ejs1.serviceId.startsWith('YOUR')) { toast('EmailJS account1 not configured','err'); btn.disabled=false; btn.textContent='📧 Send Delivery Email'; return; }

  const orderSummary = (o.orders||[]).map(x=>`${x.templateName} — for ${x.bdayName}`).join('\n');
  try {
    await emailjs.send(ejs1.serviceId, ejs1.templateId_delivery, {
      to_name:       o.buyerName,
      to_email:      o.buyerEmail,
      order_id:      curOrderId,
      template_name: (o.orders||[]).map(x=>x.templateName).join(', '),
      bday_person_name:(o.orders||[]).map(x=>x.bdayName).join(', '),
      order_summary: orderSummary,
      website_link:  link,
      qr_image_url:  qrUrl,
      from_name:     'Pookie Wishes'
    }, ejs1.publicKey);
    await db.collection('orders').doc(curOrderId).update({ status:'delivered', deliveryStatus:'delivered', deliveredAt: firebase.firestore.FieldValue.serverTimestamp() });
    if (o) { o.status='delivered'; o.deliveryStatus='delivered'; }
    updateStats(); renderTable(); toast('Delivery email sent! Order complete ✅','ok'); btn.textContent='✅ Sent!';
  } catch(e) { console.error(e); toast('Email failed','err'); btn.disabled=false; btn.textContent='📧 Send Delivery Email'; }
}

function toast(msg,type='inf') {
  const c=document.getElementById('toasts'),icons={ok:'✅',err:'❌',inf:'💬'};
  const el=document.createElement('div'); el.className=`toast ${type}`;
  el.innerHTML=`<span>${icons[type]}</span><span>${msg}</span>`; c.appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300);},3500);
}
</script>
