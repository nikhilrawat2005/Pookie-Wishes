<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favourites — Pookie Wishes ✨</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar" id="nav">
  <a href="../index.html" class="nav-logo">Pookie Wishes <sub>✨</sub></a>
  <div class="nav-links">
    <a href="../index.html" class="btn btn-ghost">Templates</a>
    <a href="how-it-works.html" class="btn btn-ghost">How It Works</a>
    <button class="btn btn-primary" id="btn-login" onclick="openModal('modal-auth')">Sign In</button>
    <div class="user-wrap hidden" id="u-wrap">
      <img class="user-av" id="u-av" src="" alt="avatar" onclick="toggleDd()">
      <div class="user-dd" id="u-dd">
        <div class="dd-head">
          <div class="dd-name" id="dd-uname"></div>
          <div class="dd-email" id="dd-uemail"></div>
        </div>
        <a class="dd-item" href="favorites.html">💖 My Favourites</a>
        <div class="dd-sep"></div>
        <div class="dd-item red" onclick="doLogout()">🚪 Sign Out</div>
      </div>
    </div>
  </div>
</nav>

<main class="inner-page">
  <div class="inner-header">
    <a href="../index.html" class="back-link">← Back to Templates</a>
    <div class="sec-chip">💖 saved</div>
    <h1 class="inner-title">My <em>Favourites</em></h1>
    <p class="inner-sub">Your saved templates, all in one place.</p>
  </div>
  <div id="fav-cont">
    <!-- rendered by JS -->
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="f-bottom" style="border-top:none; padding-top:0">
      <span>© 2025 Pookie Wishes — made with <span class="f-heart">💖</span></span>
      <span>₹99 per website ✨</span>
    </div>
  </div>
</footer>

<!-- AUTH MODAL (same on every page) -->
<div class="overlay" id="modal-auth">
  <div class="modal">
    <button class="modal-x" onclick="closeModal('modal-auth')">✕</button>
    <span class="modal-ico">🎂</span>
    <h2>Welcome!</h2>
    <p>Sign in to save favourites and track your orders.</p>
    <button class="btn btn-google btn-full" onclick="googleLogin()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v8.51h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.14z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.49-1.47-.76-3.04-.76-4.59s.27-3.12.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.55 10.78l7.98-6.19z"/>
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.55 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      </svg>
      Continue with Google
    </button>
    <div class="modal-or">or sign in with email</div>
    <div class="f-group"><input class="f-inp" id="auth-email" type="email" placeholder="your@email.com"></div>
    <div class="f-group"><input class="f-inp" id="auth-pw" type="password" placeholder="Password"></div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn btn-primary" style="flex:1" onclick="emailSignIn()">Sign In</button>
      <button class="btn btn-soft"    style="flex:1" onclick="emailRegister()">Register</button>
    </div>
    <button class="btn btn-ghost btn-full" style="font-size:.8rem" onclick="resetPassword()">Forgot password?</button>
  </div>
</div>

<div id="toasts"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/app.js"></script>
<script>
  // On this page, render favs once auth is ready
  window.PAGE = 'favorites';
</script>
</body>
</html>
